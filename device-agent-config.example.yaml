# Reference config for the per-device "reliable mode" agent.
# device-setup.sh (reliable mode) generates this automatically (substituting your hub + paths);
# shown here for reference. Claude Code -> this agent (localhost) -> spool to disk -> hub.
extensions:
  file_storage/queue:
    directory: ~/.claude-otel-agent/queue   # persistent spool — survives reboots
    timeout: 10s
receivers:
  otlp:
    protocols:
      grpc: { endpoint: 127.0.0.1:4317 }    # Claude Code sends here
      http: { endpoint: 127.0.0.1:4318 }
processors:
  batch: { timeout: 5s }
exporters:
  otlp/hub:
    endpoint: YOUR-HUB.tailNNNN.ts.net:4317
    tls: { insecure: true }                 # Tailscale already encrypts the link
    sending_queue:
      enabled: true
      storage: file_storage/queue           # queue is on disk, not just memory
      queue_size: 100000
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 60s
      max_elapsed_time: 0                    # retry forever — never drop a batch
service:
  extensions: [file_storage/queue]
  pipelines:
    metrics: { receivers: [otlp], processors: [batch], exporters: [otlp/hub] }
    logs:    { receivers: [otlp], processors: [batch], exporters: [otlp/hub] }
  telemetry:
    metrics: { level: none }
