receivers:
  otlp:
    protocols:
      grpc:
        # 0.0.0.0 accepts hub-local (127.0.0.1) AND fleet devices over Tailscale.
        # We deliberately do NOT bind the Tailscale IP directly: it is dynamic
        # (it changes when Tailscale re-keys) and binding a specific
        # tailscale IP makes the collector crash whenever that happens.
        # Access control is the Tailscale ACL layer (+ optional host firewall).
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 10s

exporters:
  prometheus:
    # Hardened: bound to localhost so only the local Prometheus can scrape the raw
    # account-labeled metrics. Fleet devices send IN via OTLP; they cannot read this.
    endpoint: 127.0.0.1:8889
    # Promotes OTLP resource attributes to Prometheus labels:
    #   device.name -> device_name,  os.user -> os_user  (per-device/per-os-user tagging)
    resource_to_telemetry_conversion:
      enabled: true
    enable_open_metrics: true
  debug:
    verbosity: normal

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus, debug]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
