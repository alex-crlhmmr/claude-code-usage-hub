receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 10s

exporters:
  # Exposes a /metrics endpoint that Prometheus scrapes.
  prometheus:
    endpoint: 0.0.0.0:8889
    # Promote Claude Code's resource attributes (user.email, account uuid,
    # organization id, model, etc.) to Prometheus labels so you can group by account.
    resource_to_telemetry_conversion:
      enabled: true
    enable_open_metrics: true
  # Mirrors everything to the collector log for quick eyeballing / debugging.
  debug:
    verbosity: detailed

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus, debug]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
